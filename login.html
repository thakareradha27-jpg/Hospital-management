<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Login - Vector Hospital</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS for login -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand bg-custom">
  <a class="navbar-brand" href="index.html"> <i class="bi bi-hospital"></i> Vector </a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarText">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item">
        <a class="nav-link" href="index.html"> <i class="bi bi-house-door-fill"></i> Home </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="about.html">About us</a>
      </li>
      <li class="nav-item active">
        <a class="nav-link" href="login.html"><i class="bi bi-box-arrow-in-right"></i> Login</a>
      </li>
    </ul>
  </div>
</nav>

<!-- Login Form Section -->
<div class="container login-container">
  <div class="row justify-content-center">
    <div class="col-md-6 mb-4">
      <div class="card login-card shadow-sm">
        <div class="card-header"><i class="bi bi-box-arrow-in-right"></i> Patient Login</div>
        <div class="card-body">
          <form>
            <div class="form-group">
              <label for="loginEmail">Email </label>
              <input type="text" class="form-control" id="loginEmail" placeholder="Enter email or phone" required>
            </div>
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-success btn-block">Login</button>
            <p class="text-center mt-2"><a href="#" class="text-success">Forgot password?</a></p>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="text-center text-white bg-success p-3 mt-5">
    &copy; 2025 Vector Hospital. All Rights Reserved.
</footer>

<!-- JS Scripts -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

</body>
</html>
